<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1850" viewBox="0 0 1400 1850">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: none; stroke: #222; stroke-width: 3; }
      .dash { fill: none; stroke: #222; stroke-width: 3; stroke-dasharray: 14 8; }
      .title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 28px; fill: #111; }
      .text { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 20px; fill: #111; }
      .small { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 17px; fill: #111; }
      .layer { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 34px; fill: #111; }
      .center { text-anchor: middle; dominant-baseline: middle; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="1850"/>

  <text class="title" x="700" y="50" text-anchor="middle">上市公司财报智能问数助手 Web 系统架构图</text>

  <rect class="box" x="40" y="90" width="180" height="160"/>
  <text class="layer center" x="130" y="170">前端UI</text>

  <rect class="box" x="260" y="90" width="1100" height="160"/>
  <rect class="box" x="275" y="104" width="110" height="40"/>
  <text class="text center" x="330" y="124">WEB</text>
  <rect class="box" x="360" y="132" width="160" height="80"/>
  <text class="text center" x="440" y="172">Flask 模板</text>
  <rect class="box" x="570" y="132" width="160" height="80"/>
  <text class="text center" x="650" y="172">index.html</text>
  <rect class="box" x="790" y="132" width="160" height="80"/>
  <text class="text center" x="870" y="172">app.css</text>
  <rect class="box" x="1010" y="132" width="160" height="80"/>
  <text class="text center" x="1090" y="172">app.js</text>
  <rect class="box" x="1190" y="132" width="140" height="80"/>
  <text class="text center" x="1260" y="172">Fetch/Ajax</text>

  <line class="dash" x1="40" y1="295" x2="1360" y2="295"/>
  <line class="box" x1="700" y1="250" x2="700" y2="290" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <rect class="box" x="40" y="340" width="180" height="160"/>
  <text class="layer center" x="130" y="420">展示层</text>

  <rect class="box" x="260" y="340" width="1000" height="160"/>
  <rect class="box" x="275" y="355" width="160" height="60"/>
  <text class="text center" x="355" y="385">页面渲染</text>
  <rect class="box" x="455" y="385" width="250" height="80"/>
  <text class="text center" x="580" y="425">GET /  /api/overview</text>
  <rect class="box" x="760" y="385" width="250" height="80"/>
  <text class="text center" x="885" y="425">POST /api/chat</text>
  <rect class="box" x="1030" y="385" width="210" height="80"/>
  <text class="text center" x="1135" y="425">POST 重建接口</text>

  <rect class="box" x="1285" y="340" width="75" height="160"/>
  <text class="text center" x="1322" y="420" transform="rotate(90 1322 420)">结果图片服务</text>

  <line class="dash" x1="40" y1="545" x2="1360" y2="545"/>
  <line class="box" x1="700" y1="500" x2="700" y2="540" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <rect class="box" x="40" y="590" width="180" height="520"/>
  <text class="layer center" x="130" y="850">业务层</text>

  <rect class="box" x="260" y="590" width="830" height="520"/>
  <rect class="box" x="290" y="620" width="110" height="180"/>
  <text class="text center" x="345" y="710">Flask</text>
  <text class="text center" x="345" y="740">app.py</text>

  <rect class="dash" x="450" y="620" width="570" height="440"/>

  <rect class="box" x="475" y="650" width="220" height="78"/>
  <text class="text center" x="585" y="689">create_app()</text>
  <rect class="box" x="760" y="650" width="220" height="78"/>
  <text class="text center" x="870" y="689">_get_assistant()</text>

  <rect class="box" x="475" y="775" width="220" height="78"/>
  <text class="text center" x="585" y="814">FinancialAssistant</text>
  <rect class="box" x="760" y="775" width="220" height="78"/>
  <text class="text center" x="870" y="814">process_query()</text>

  <rect class="box" x="475" y="900" width="220" height="78"/>
  <text class="small center" x="585" y="939">意图识别 / 槽位抽取</text>
  <rect class="box" x="760" y="900" width="220" height="78"/>
  <text class="small center" x="870" y="939">SQL生成 / 查询执行</text>

  <rect class="box" x="475" y="1025" width="220" height="78"/>
  <text class="small center" x="585" y="1064">知识检索 / 原因分析</text>
  <rect class="box" x="760" y="1025" width="220" height="78"/>
  <text class="small center" x="870" y="1064">答案格式化 / 图表生成</text>

  <rect class="box" x="1120" y="640" width="90" height="420"/>
  <text class="text center" x="1165" y="850" transform="rotate(90 1165 850)">会话管理</text>

  <rect class="box" x="1235" y="640" width="95" height="420"/>
  <text class="text center" x="1282" y="850" transform="rotate(90 1282 850)">重建控制</text>

  <line class="dash" x1="40" y1="1155" x2="1360" y2="1155"/>
  <line class="box" x1="700" y1="1110" x2="700" y2="1150" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <rect class="box" x="40" y="1200" width="180" height="150"/>
  <text class="layer center" x="130" y="1275">数据层</text>

  <rect class="box" x="260" y="1200" width="1100" height="150"/>
  <rect class="box" x="330" y="1235" width="180" height="80"/>
  <text class="text center" x="420" y="1275">ensure_database()</text>
  <rect class="box" x="570" y="1235" width="180" height="80"/>
  <text class="text center" x="660" y="1275">create_db_engine()</text>
  <rect class="box" x="810" y="1235" width="180" height="80"/>
  <text class="text center" x="900" y="1275">build_knowledge()</text>
  <rect class="box" x="1050" y="1235" width="240" height="80"/>
  <text class="text center" x="1170" y="1275">RESULT_DIR / send_from_directory</text>

  <line class="dash" x1="40" y1="1395" x2="1360" y2="1395"/>
  <line class="box" x1="700" y1="1350" x2="700" y2="1390" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <rect class="box" x="40" y="1440" width="180" height="180"/>
  <text class="layer center" x="130" y="1530">数据库</text>

  <rect class="box" x="260" y="1440" width="1100" height="180"/>
  <rect class="box" x="330" y="1485" width="180" height="90"/>
  <text class="text center" x="420" y="1520">finance_database.db</text>
  <text class="small center" x="420" y="1548">SQLite</text>

  <rect class="box" x="560" y="1485" width="180" height="90"/>
  <text class="text center" x="650" y="1520">core_performance</text>

  <rect class="box" x="790" y="1485" width="180" height="90"/>
  <text class="text center" x="880" y="1510">balance_sheet</text>
  <text class="small center" x="880" y="1540">income_statement</text>

  <rect class="box" x="1020" y="1485" width="180" height="90"/>
  <text class="text center" x="1110" y="1510">cash_flow</text>
  <text class="small center" x="1110" y="1540">knowledge_index.json</text>

  <rect class="box" x="1230" y="1485" width="95" height="90"/>
  <text class="text center" x="1277" y="1520">result</text>
  <text class="small center" x="1277" y="1548">*.jpg</text>

  <text class="small" x="265" y="1665">说明：前端由 index.html + app.css + app.js 组成，通过 Fetch/Ajax 调用 Flask API；</text>
  <text class="small" x="265" y="1698">后端以 FinancialAssistant 为问答总调度中心，串联意图识别、SQL 查询、知识检索、图表生成和结果输出。</text>
  <text class="small" x="265" y="1731">数据库层使用 SQLite 财报库，知识层使用 knowledge_index.json，结果图片通过 /result/&lt;filename&gt; 提供访问。</text>
</svg>
